<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV 커뮤니티 - 관리자 모드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'sans-serif'; }
        .admin-only { display: none; } /* 기본적으로 숨김 */
        .is-admin .admin-only { display: block; } /* 관리자일 때만 표시 */
        .tab-active { border-bottom: 2px solid #ff4655; color: #ff4655; }
    </style>
</head>
<body class="is-admin"> <!-- 테스트를 위해 관리자 클래스 추가 상태 -->

    <!-- 네비게이션 -->
    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#111]">
        <h1 class="text-xl font-bold text-[#ff4655]">SV COMMUNITY</h1>
        <div class="flex items-center gap-4">
            <span class="text-xs bg-gray-700 px-2 py-1 rounded">ckdgud1117-maker (관리자)</span>
            <button class="text-sm">로그아웃</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4">
        <!-- 탭 메뉴 -->
        <div class="flex gap-6 mb-8 text-sm font-bold border-b border-gray-800">
            <button class="pb-2 tab-active">커뮤니티 홈</button>
            <button class="pb-2 text-gray-500">전적 검색</button>
            <button class="pb-2 text-gray-500 admin-only">관리자 패널</button>
        </div>

        <!-- 게시판 목록 섹션 -->
        <section class="mb-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">게시판 목록</h2>
                <!-- 관리자 전용 게시판 추가 버튼 -->
                <button onclick="addBoard()" class="admin-only bg-[#ff4655] text-white w-8 h-8 rounded-full font-bold">+</button>
            </div>
            <div id="board-list" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="p-4 bg-[#1a1a1a] rounded border border-gray-800 hover:border-[#ff4655] cursor-pointer text-center">자유게시판</div>
                <div class="p-4 bg-[#1a1a1a] rounded border border-gray-800 hover:border-[#ff4655] cursor-pointer text-center">공지사항</div>
            </div>
        </section>

        <!-- 관리자 패널 (유저 관리) -->
        <section class="admin-only border-t border-red-900 pt-10">
            <h2 class="text-red-500 font-bold mb-4">관리자 전용: 유저 제재 관리</h2>
            <div class="overflow-x-auto bg-[#111] rounded">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-800">
                        <tr>
                            <th class="p-3">유저 아이디</th>
                            <th class="p-3">가입일</th>
                            <th class="p-3">제재 설정</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-gray-800">
                            <td class="p-3">test_user01</td>
                            <td class="p-3">2026-05-15</td>
                            <td class="p-3 flex gap-1">
                                <button class="bg-yellow-700 px-2 py-1 rounded text-xs">1일</button>
                                <button class="bg-orange-700 px-2 py-1 rounded text-xs">7일</button>
                                <button class="bg-red-700 px-2 py-1 rounded text-xs">영구</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // 게시판 추가 함수 (관리자용)
        function addBoard() {
            const boardName = prompt("추가할 게시판 이름을 입력하세요:");
            if (boardName) {
                const list = document.getElementById('board-list');
                const newBoard = document.createElement('div');
                newBoard.className = "p-4 bg-[#1a1a1a] rounded border border-gray-800 hover:border-[#ff4655] cursor-pointer text-center";
                newBoard.innerText = boardName;
                list.appendChild(newBoard);
                alert(boardName + " 게시판이 추가되었습니다.");
            }
        }
    </script>
</body>
</html>
