<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV 커뮤니티 - 실시간 서버 모드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'sans-serif'; }
        .admin-nickname {
            font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gold-shine 3s infinite linear; background-size: 200% auto;
        }
        @keyframes gold-shine { to { background-position: 200% center; } }
        .admin-only { display: none; }
        .is-admin .admin-only { display: inline-block; }
    </style>
</head>
<body class="is-admin">

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#111]">
        <h1 class="text-xl font-bold text-[#ff4655]">SV COMMUNITY</h1>
        <span class="admin-nickname text-xs text-white">👑 ckdgud1117-maker</span>
    </nav>

    <div class="max-w-3xl mx-auto p-4">
        <div class="mt-6 p-6 bg-[#1a1a1a] rounded-xl border border-gray-800 relative">
            <div class="flex justify-between items-start mb-4">
                <h2 class="text-xl font-bold text-white">서든/발로 통합 커뮤니티 정식 연동 완료</h2>
                <div class="text-right">
                    <span class="text-[10px] text-gray-500">조회 <span id="view-count">0</span></span>
                    <button onclick="updateViews()" class="admin-only ml-1 text-blue-500 text-[10px]">✎ 조작</button>
                </div>
            </div>
            <p class="text-gray-300">이제 이 숫자는 데이터베이스에 실제로 저장됩니다.</p>
        </div>
    </div>

    <script>
        // 1. Supabase 설정 (보내주신 정보 적용)
        const SUPABASE_URL = 'https://xbpiehjkabgpwzeoekdj.supabase.co';
        const SUPABASE_KEY = 'Sb_publishable_h4h3ZFAbQoYnQIKS8GYQqQ_h1giNJLK';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. 조회수 가져오기 함수
        async function loadViews() {
            let { data, error } = await supabase.from('posts').select('views').eq('id', 1).single();
            if (data) document.getElementById('view-count').innerText = data.views;
        }

        // 3. 조회수 조작 함수 (관리자용)
        async function updateViews() {
            const newVal = prompt("수정할 조회수를 입력하세요:");
            if (newVal) {
                const { error } = await supabase.from('posts').update({ views: parseInt(newVal) }).eq('id', 1);
                if (!error) {
                    document.getElementById('view-count').innerText = newVal;
                    alert("DB에 성공적으로 저장되었습니다!");
                }
            }
        }

        loadViews(); // 페이지 시작 시 조회수 로드
    </script>
</body>
</html>
