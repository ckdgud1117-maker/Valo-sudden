<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV COMMUNITY - 멤버십 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'sans-serif'; }
        .admin-nickname {
            font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-shine 3s infinite linear;
            background-size: 200% auto;
        }
        @keyframes gold-shine { to { background-position: 200% center; } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#111] sticky top-0 z-50">
        <h1 class="text-xl font-bold text-[#ff4655] tracking-tighter" onclick="location.reload()">SV COMMUNITY</h1>
        <div id="auth-status" class="text-[10px] text-gray-500 flex items-center gap-3">
            </div>
    </nav>

    <div class="max-w-3xl mx-auto p-4">
        <div class="mt-6 p-6 bg-[#1a1a1a] rounded-t-xl border border-gray-800">
            <h2 class="text-lg font-bold text-white mb-2 font-mono">SV_COMMUNITY_SYSTEM_V1</h2>
            <p class="text-gray-400 text-xs leading-relaxed mb-6">
                본 사이트는 회원제로 운영됩니다. <br>
                비회원은 게시글과 댓글 열람만 가능하며, 소통을 위해선 로그인이 필요합니다.
            </p>
            
            <div class="flex gap-4 border-t border-gray-800 pt-4 items-center">
                <button onclick="likePost()" class="flex items-center gap-2 text-xs bg-gray-800 px-4 py-2 rounded-full hover:bg-gray-700 transition">
                    👍 <span id="like-count">0</span>
                </button>
                <span class="text-[10px] text-gray-600 uppercase tracking-widest">Server Linked</span>
            </div>
        </div>

        <div class="bg-[#111] border-x border-b border-gray-800 p-4 rounded-b-xl mb-10">
            <h3 class="text-[10px] font-bold mb-4 text-gray-600 uppercase tracking-widest">Comments</h3>
            
            <div id="comment-list" class="space-y-4 mb-6">
                </div>

            <div id="comment-form-container" class="border-t border-gray-800 pt-4">
                </div>
        </div>
    </div>

    <div id="auth-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center hidden p-4">
        <div class="bg-[#1a1a1a] p-8 rounded-2xl border border-gray-800 w-full max-w-sm">
            <h2 class="text-xl font-bold text-white mb-2 text-center">MEMBERSHIP</h2>
            <p class="text-gray-500 text-[10px] text-center mb-6 uppercase tracking-widest">Access your account</p>
            
            <div class="space-y-3">
                <input type="email" id="auth-email" placeholder="이메일 주소" class="w-full bg-black border border-gray-700 p-3 rounded text-sm outline-none focus:border-[#ff4655] transition">
                <input type="password" id="auth-password" placeholder="비밀번호" class="w-full bg-black border border-gray-700 p-3 rounded text-sm outline-none focus:border-[#ff4655] transition">
                
                <div class="flex gap-2 pt-2">
                    <button onclick="handleSignUp()" class="flex-1 bg-gray-800 py-3 rounded font-bold text-xs hover:bg-gray-700 transition">회원가입</button>
                    <button onclick="handleLogin()" class="flex-1 bg-[#ff4655] py-3 rounded font-bold text-xs hover:bg-[#ff4655]/80 transition text-white">로그인</button>
                </div>
                <button onclick="closeAuthModal()" class="w-full text-gray-600 text-[10px] mt-4 hover:text-white transition">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbpiehjkabgpwzeoekdj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_h4h3ZFAbQoYnQIKS8GYQqQ_h1giNJLK';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // 1. 초기 실행
        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            currentUser = user;
            updateUI();
            loadViews();
            loadComments();
        }

        // 2. 모달 제어
        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        // 3. 화면 UI 업데이트
        function updateUI() {
            const authStatus = document.getElementById('auth-status');
            const formContainer = document.getElementById('comment-form-container');

            if (currentUser) {
                const nick = currentUser.email.split('@')[0];
                authStatus.innerHTML = `
                    <span class="admin-nickname">${nick}</span>
                    <button onclick="handleLogout()" class="hover:text-white underline">로그아웃</button>`;
                
                formContainer.innerHTML = `
                    <div class="flex gap-2">
                        <input type="text" id="comment-input" placeholder="멤버들과 자유롭게 소통하세요." class="flex-1 bg-black border border-gray-700 p-3 rounded text-xs outline-none focus:border-[#ff4655]">
                        <button onclick="writeComment()" class="bg-[#ff4655] px-6 py-2 rounded font-bold text-white text-xs">등록</button>
                    </div>`;
            } else {
                authStatus.innerHTML = `<button onclick="openAuthModal()" class="hover:text-white underline">로그인/회원가입</button>`;
                formContainer.innerHTML = `
                    <div class="bg-black/40 p-6 rounded border border-dashed border-gray-800 text-center">
                        <p class="text-[10px] text-gray-500 mb-3 tracking-widest">JOIN OUR COMMUNITY</p>
                        <button onclick="openAuthModal()" class="text-[#ff4655] text-xs font-bold border border-[#ff4655] px-4 py-2 rounded hover:bg-[#ff4655] hover:text-white transition">로그인 후 댓글 작성</button>
                    </div>`;
            }
        }

        // 4. 회원가입/로그인 로직
        async function handleSignUp() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) alert("실패: " + error.message);
            else alert("가입 신청 완료! 이메일 인증이 필요할 수 있습니다.");
        }

        async function handleLogin() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert("로그인 실패: " + error.message);
            else {
                alert("반갑습니다!");
                location.reload();
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            location.reload();
        }

        // 5. 댓글 및 게시글 기능
        async function loadComments() {
            let { data } = await _supabase.from('comments').select('*').eq('post_id', 1).order('created_at', { ascending: true });
            const list = document.getElementById('comment-list');
            list.innerHTML = '';
            
            data?.forEach(c => {
                const isAdmin = c.nickname === 'ckdgud1117' || c.is_admin === true;
                const div = document.createElement('div');
                div.className = `p-3 rounded border ${isAdmin ? 'border-yellow-500/30 bg-yellow-500/5' : 'border-gray-800 bg-[#151515]'}`;
                div.innerHTML = `
                    <div class="flex justify-between mb-1">
                        <span class="text-[10px] font-bold ${isAdmin ? 'text-yellow-500' : 'text-blue-400'}">${isAdmin ? '👑 ' : ''}${c.nickname}</span>
                        <span class="text-[8px] text-gray-600">${new Date(c.created_at).toLocaleTimeString()}</span>
                    </div>
                    <p class="text-xs text-gray-300">${c.content}</p>`;
                list.appendChild(div);
            });
        }

        async function writeComment() {
            if (!currentUser) return;
            const input = document.getElementById('comment-input');
            const content = input.value.trim();
            if (!content) return;

            const { error } = await _supabase.from('comments').insert([{
                post_id: 1,
                nickname: currentUser.email.split('@')[0],
                content,
                is_admin: currentUser.email === 'ckdgud1117@gmail.com' // 님 이메일로 수정!
            }]);

            if (!error) { input.value = ''; loadComments(); }
        }

        async function loadViews() {
            let { data } = await _supabase.from('posts').select('likes').eq('id', 1).single();
            if (data) document.getElementById('like-count').innerText = data.likes || 0;
        }

        async function likePost() {
            let { data } = await _supabase.from('posts').select('likes').eq('id', 1).single();
            await _supabase.from('posts').update({ likes: (data.likes || 0) + 1 }).eq('id', 1);
            loadViews();
        }

        init();
    </script>
</body>
</html>
