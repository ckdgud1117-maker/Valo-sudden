<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV 커뮤니티 - 마스터 컨트롤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'sans-serif'; }
        .admin-nickname {
            font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gold-shine 3s infinite linear; background-size: 200% auto;
        }
        @keyframes gold-shine { to { background-position: 200% center; } }
        .admin-only { display: none; }
        .is-admin .admin-only { display: inline-block; }
        .post-card { background: #1a1a1a; border: 1px solid #333; transition: 0.2s; }
        .post-card:hover { border-color: #ff4655; }
    </style>
</head>
<body class="is-admin"> <!-- 관리자 모드 활성화 -->

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#111]">
        <h1 class="text-xl font-bold text-[#ff4655]">SV COMMUNITY</h1>
        <span class="admin-nickname text-xs">👑 ckdgud1117-maker</span>
    </nav>

    <div class="max-w-3xl mx-auto p-4">
        <!-- 게시글 본문 예시 -->
        <div class="mt-6 p-6 post-card rounded-t-xl relative">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-xl font-bold text-white">서든어택 보급창고 팁 공유합니다</h2>
                    <p class="text-gray-500 text-xs mt-1">작성자: 고수유저 | 2026.05.15</p>
                </div>
                <!-- 조회수 및 조작 버튼 -->
                <div class="text-right">
                    <span class="text-[10px] text-gray-500">조회 <span id="view-count">482</span></span>
                    <button onclick="editViews()" class="admin-only ml-1 text-blue-500 text-[10px]">✎ 수정</button>
                </div>
            </div>
            
            <div class="py-4 text-gray-200">
                에이 보급에서 설대 뒤쪽 폭 던지는 법 알려드림... (생략)
            </div>

            <!-- 추천 버튼 구역 -->
            <div class="flex gap-4 mt-6 border-t border-gray-800 pt-4">
                <button onclick="likePost()" class="flex items-center gap-1 text-sm bg-gray-800 px-3 py-1 rounded hover:bg-gray-700">
                    👍 <span id="like-count">12</span>
                </button>
                <button class="text-sm text-gray-500">💬 댓글 2</button>
            </div>
        </div>

        <!-- 댓글 구역 -->
        <div class="bg-[#111] border-x border-b border-gray-800 p-4 rounded-b-xl space-y-4">
            <div class="p-3 bg-[#1a1a1a] rounded border border-gray-800 flex justify-between items-center">
                <div>
                    <span class="text-xs font-bold text-blue-400">발로러버</span>
                    <p class="text-sm text-gray-300 mt-1">와 대박 꿀팁이네요 ㅋㅋ</p>
                </div>
                <button class="text-[10px] bg-gray-800 px-2 py-1 rounded text-gray-400">👍 2</button>
            </div>
            
            <!-- 댓글 입력 -->
            <div class="flex gap-2 pt-2">
                <input type="text" placeholder="댓글을 남겨보세요" class="flex-1 bg-black border border-gray-700 p-2 rounded text-sm outline-none">
                <button class="bg-[#ff4655] px-4 py-2 rounded text-sm font-bold">등록</button>
            </div>
        </div>
    </div>

    <script>
        // 조회수 조작 함수 (관리자용)
        function editViews() {
            const newCount = prompt("현재 조회수: " + document.getElementById('view-count').innerText + "\n수정할 조회수를 입력하세요:");
            if(newCount !== null) {
                document.getElementById('view-count').innerText = newCount;
                alert("조회수가 " + newCount + "(으)로 조작... 아니, 수정되었습니다! 😎");
            }
        }

        // 추천 버튼 함수
        let liked = false;
        function likePost() {
            const count = document.getElementById('like-count');
            if(!liked) {
                count.innerText = parseInt(count.innerText) + 1;
                liked = true;
            } else {
                alert("이미 추천하셨습니다!");
            }
        }
    </script>
</body>
</html>
