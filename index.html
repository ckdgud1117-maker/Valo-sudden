<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV COMMUNITY - 관리자 모드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'sans-serif'; overflow-x: hidden; }
        .admin-nickname {
            font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-shine 3s infinite linear;
            background-size: 200% auto;
        }
        @keyframes gold-shine { to { background-position: 200% center; } }
        .admin-only { display: none; }
        .is-admin .admin-only { display: inline-block; }
        .admin-reply { border-left: 3px solid #bf953f !important; background: rgba(191, 149, 63, 0.05); }
    </style>
</head>
<body class="is-admin">

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#111] sticky top-0 z-50">
        <h1 class="text-xl font-bold text-[#ff4655] tracking-tighter">SV COMMUNITY</h1>
        <span class="admin-nickname text-xs">👑 ckdgud1117-maker</span>
    </nav>

    <div class="max-w-3xl mx-auto p-4">
        <div class="mt-6 p-6 bg-[#1a1a1a] rounded-t-xl border border-gray-800 relative">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-xl font-bold text-white mb-2">서든/발로 통합 커뮤니티 서버 연동 테스트</h2>
                    <p class="text-gray-500 text-xs">작성자: <span class="admin-nickname">운영자</span> | 2026.05.15</p>
                </div>
                <div class="text-right">
                    <div class="bg-black/50 px-2 py-1 rounded border border-gray-800">
                        <span class="text-[10px] text-gray-400 tracking-widest uppercase">Views</span>
                        <div class="text-lg font-mono font-bold text-white" id="view-count">0</div>
                    </div>
                    <button onclick="updateViews()" class="admin-only mt-1 text-blue-500 text-[10px] hover:underline cursor-pointer">✎ 조회수 조작</button>
                </div>
            </div>
            
            <div class="mt-6 text-gray-200 leading-relaxed border-t border-gray-800 pt-6">
                현재 이 게시글은 **Supabase 실시간 데이터베이스**와 완벽히 연동되어 있습니다. <br><br>
                조회수, 추천수, 그리고 이제는 **댓글**까지 실제 DB에 저장됩니다. 
                경주 세븐일레븐 야간 근무의 결실을 확인해 보세요!
            </div>

            <div class="flex gap-4 mt-8 border-t border-gray-800 pt-4">
                <button onclick="likePost()" class="flex items-center gap-2 text-sm bg-gray-800 px-4 py-2 rounded-full hover:bg-gray-700 transition">
                    👍 <span id="like-count">0</span>
                </button>
                <button class="flex items-center gap-2 text-sm text-gray-500 px-4 py-2">💬 댓글</button>
            </div>
        </div>

        <div class="bg-[#111] border-x border-b border-gray-800 p-4 rounded-b-xl mb-10">
            <h3 class="text-xs font-bold mb-4 text-gray-600 uppercase tracking-widest">Comments</h3>
            
            <div id="comment-list" class="space-y-4 mb-6">
                <p class="text-xs text-gray-500 text-center py-4">댓글을 작성하면 DB에 저장됩니다!</p>
            </div>

            <div class="flex gap-2 border-t border-gray-800 pt-4">
                <input type="text" id="comment-input" placeholder="따뜻한 댓글을 남겨주세요..." class="flex-1 bg-black border border-gray-700 p-3 rounded text-sm outline-none focus:border-[#ff4655] transition">
                <button onclick="writeComment()" class="bg-[#ff4655] px-6 py-2 rounded font-bold text-white text-sm hover:bg-[#ff4655]/80 transition">등록</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbpiehjkabgpwzeoekdj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_h4h3ZFAbQoYnQIKS8GYQqQ_h1giNJLK';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. 초기 데이터 로드 (조회수/추천수)
        async function loadViews() {
            try {
                let { data, error } = await _supabase
                    .from('posts')
                    .select('views, likes')
                    .eq('id', 1)
                    .single();
                
                if (data) {
                    document.getElementById('view-count').innerText = (data.views || 0).toLocaleString();
                    document.getElementById('like-count').innerText = (data.likes || 0).toLocaleString();
                }
            } catch (e) { console.error("로드 실패:", e); }
        }

        // 2. 조회수 조작
        async function updateViews() {
            const currentViews = document.getElementById('view-count').innerText.replace(/,/g, '');
            const newVal = prompt("조작할 숫자를 입력하세요:", currentViews);
            if (newVal !== null && !isNaN(newVal)) {
                await _supabase.from('posts').update({ views: parseInt(newVal) }).eq('id', 1);
                loadViews();
            }
        }

        // 3. 추천하기
        async function likePost() {
            let { data } = await _supabase.from('posts').select('likes').eq('id', 1).single();
            const currentLikes = data ? (data.likes || 0) : 0;
            const { error } = await _supabase.from('posts').update({ likes: currentLikes + 1 }).eq('id', 1);
            if (!error) {
                alert("추천 완료! 👍");
                loadViews();
            }
        }

        // 4. 댓글 쓰기 (오늘의 핵심!)
        async function writeComment() {
            const input = document.getElementById('comment-input');
            const content = input.value;

            if (!content) {
                alert("내용을 입력해주세요!");
                return;
            }

            const { error } = await _supabase
                .from('comments')
                .insert([{ post_id: 1, nickname: 'Gyeongju_User', content: content }]);

            if (!error) {
                input.value = '';
                alert("댓글이 성공적으로 DB에 저장되었습니다! 😎");
                // 다음 단계에서 '불러오기' 기능을 추가하면 화면에 바로 뜹니다!
            } else {
                alert("댓글 저장 실패: " + error.message);
            }
        }

        loadViews();
    </script>
</body>
</html>
