<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV COMMUNITY - 멤버십 운영</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'sans-serif'; }
        .admin-nickname {
            font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-shine 3s infinite linear;
            background-size: 200% auto;
        }
        @keyframes gold-shine { to { background-position: 200% center; } }
    </style>
</head>
<body>

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#111] sticky top-0 z-50">
        <h1 class="text-xl font-bold text-[#ff4655] tracking-tighter cursor-pointer">SV COMMUNITY</h1>
        <div id="auth-status" class="text-[10px] text-gray-500">
            </div>
    </nav>

    <div class="max-w-3xl mx-auto p-4">
        <div class="mt-6 p-6 bg-[#1a1a1a] rounded-t-xl border border-gray-800">
            <h2 class="text-lg font-bold text-white mb-2">통합 커뮤니티 멤버십 시스템 가동</h2>
            <p class="text-gray-400 text-xs leading-relaxed mb-6">
                눈팅은 자유! 하지만 소통에 참여하고 싶다면 멤버가 되어주세요. <br>
                건전한 커뮤니티 문화를 위해 댓글은 회원제로 운영됩니다.
            </p>
            
            <div class="flex gap-4 border-t border-gray-800 pt-4">
                <button onclick="likePost()" class="flex items-center gap-2 text-xs bg-gray-800 px-4 py-2 rounded-full hover:bg-gray-700 transition">
                    👍 <span id="like-count">0</span>
                </button>
                <div class="flex items-center gap-2 text-[10px] text-gray-500">
                    👁️ <span id="view-count">0</span>
                </div>
            </div>
        </div>

        <div class="bg-[#111] border-x border-b border-gray-800 p-4 rounded-b-xl mb-10">
            <h3 class="text-[10px] font-bold mb-4 text-gray-600 uppercase tracking-widest">Comments</h3>
            
            <div id="comment-list" class="space-y-4 mb-6">
                </div>

            <div id="comment-form-container" class="border-t border-gray-800 pt-4">
                </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbpiehjkabgpwzeoekdj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_h4h3ZFAbQoYnQIKS8GYQqQ_h1giNJLK';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // 초기 실행
        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            currentUser = user;
            
            updateUI();
            loadViews();
            loadComments();
        }

        // 로그인 여부에 따른 화면 업데이트
        function updateUI() {
            const authStatus = document.getElementById('auth-status');
            const formContainer = document.getElementById('comment-form-container');

            if (currentUser) {
                // 로그인 된 경우: 내 닉네임 표시 및 입력창 활성화
                const myNick = currentUser.email.split('@')[0];
                authStatus.innerHTML = `<span class="admin-nickname">${myNick}</span>님 접속 중`;
                formContainer.innerHTML = `
                    <div class="flex gap-2">
                        <input type="text" id="comment-input" placeholder="커뮤니티를 따뜻하게 만드는 댓글을 작성해주세요." class="flex-1 bg-black border border-gray-700 p-3 rounded text-xs outline-none focus:border-[#ff4655]">
                        <button onclick="writeComment()" class="bg-[#ff4655] px-6 py-2 rounded font-bold text-white text-xs">등록</button>
                    </div>`;
            } else {
                // 비회원인 경우: 로그인 유도 문구 표시
                authStatus.innerHTML = `<button onclick="alert('로그인 기능 준비 중')" class="hover:text-white underline">회원가입/로그인</button>`;
                formContainer.innerHTML = `
                    <div class="bg-black/40 p-5 rounded border border-dashed border-gray-800 text-center">
                        <p class="text-[10px] text-gray-500 mb-2">로그인한 멤버만 댓글을 남길 수 있습니다.</p>
                        <button onclick="alert('로그인 기능 준비 중')" class="text-[#ff4655] text-xs font-bold hover:underline">로그인하고 대화 참여하기</button>
                    </div>`;
            }
        }

        // 댓글 불러오기 (비회원도 가능)
        async function loadComments() {
            let { data } = await _supabase.from('comments').select('*').eq('post_id', 1).order('created_at', { ascending: true });
            const list = document.getElementById('comment-list');
            list.innerHTML = '';

            if (data && data.length > 0) {
                data.forEach(c => {
                    const isAdmin = c.nickname === 'ckdgud1117' || c.is_admin === true;
                    const div = document.createElement('div');
                    div.className = `p-3 rounded border ${isAdmin ? 'border-yellow-500/30 bg-yellow-500/5' : 'border-gray-800 bg-[#151515]'}`;
                    div.innerHTML = `
                        <div class="flex justify-between mb-1">
                            <span class="text-[10px] font-bold ${isAdmin ? 'text-yellow-500' : 'text-blue-400'}">${isAdmin ? '👑 ' : ''}${c.nickname}</span>
                            <span class="text-[8px] text-gray-600">${new Date(c.created_at).toLocaleTimeString()}</span>
                        </div>
                        <p class="text-xs text-gray-300">${c.content}</p>`;
                    list.appendChild(div);
                });
            } else {
                list.innerHTML = '<p class="text-center py-6 text-gray-600 text-xs font-light tracking-widest italic">첫 소통의 주인공이 되어보세요.</p>';
            }
        }

        // 댓글 쓰기 (회원만 가능)
        async function writeComment() {
            if (!currentUser) return alert("로그인 후 이용 가능합니다!");
            
            const input = document.getElementById('comment-input');
            const content = input.value.trim();
            if (!content) return;

            const { error } = await _supabase.from('comments').insert([{
                post_id: 1,
                nickname: currentUser.email.split('@')[0],
                content: content,
                is_admin: currentUser.email === 'ckdgud1117@gmail.com' // 님 이메일로 바꿔주세요!
            }]);

            if (!error) {
                input.value = '';
                loadComments();
            }
        }

        // 조회수/추천수 (기존과 동일)
        async function loadViews() {
            let { data } = await _supabase.from('posts').select('views, likes').eq('id', 1).single();
            if (data) {
                document.getElementById('view-count').innerText = data.views || 0;
                document.getElementById('like-count').innerText = data.likes || 0;
            }
        }
        async function likePost() {
            let { data } = await _supabase.from('posts').select('likes').eq('id', 1).single();
            await _supabase.from('posts').update({ likes: (data.likes || 0) + 1 }).eq('id', 1);
            loadViews();
        }

        init();
    </script>
</body>
</html>
