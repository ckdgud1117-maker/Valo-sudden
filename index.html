<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV COMMUNITY - 관리자 모드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'sans-serif'; overflow-x: hidden; }
        .admin-nickname {
            font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-shine 3s infinite linear;
            background-size: 200% auto;
        }
        @keyframes gold-shine { to { background-position: 200% center; } }
        .admin-only { display: none; }
        .is-admin .admin-only { display: inline-block; }
    </style>
</head>
<body class="is-admin">

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#111] sticky top-0 z-50">
        <h1 class="text-xl font-bold text-[#ff4655] tracking-tighter">SV COMMUNITY</h1>
        <span class="admin-nickname text-xs">👑 ckdgud1117-maker</span>
    </nav>

    <div class="max-w-3xl mx-auto p-4">
        <div class="mt-6 p-6 bg-[#1a1a1a] rounded-t-xl border border-gray-800">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h2 class="text-xl font-bold text-white mb-2">서든/발로 통합 커뮤니티 서버 연동 테스트</h2>
                    <p class="text-gray-500 text-xs">작성자: <span class="admin-nickname">운영자</span> | 2026.05.15</p>
                </div>
                <div class="text-right">
                    <div class="bg-black/50 px-2 py-1 rounded border border-gray-800">
                        <span class="text-[10px] text-gray-400 tracking-widest uppercase">Views</span>
                        <div class="text-lg font-mono font-bold text-white" id="view-count">0</div>
                    </div>
                    <button onclick="updateViews()" class="admin-only mt-1 text-blue-500 text-[10px] hover:underline cursor-pointer">✎ 조회수 조작</button>
                </div>
            </div>
            
            <div class="mt-6 text-gray-200 leading-relaxed border-t border-gray-800 pt-6 text-sm">
                **보안 업데이트 완료:** <br>
                이제 비회원은 '운영자' 또는 'ckdgud1117' 닉네임을 사용할 수 없습니다. <br>
                진짜 운영자는 로그인 후 권한을 증명해야 왕관 배지가 활성화됩니다.
            </div>

            <div class="flex gap-4 mt-8 border-t border-gray-800 pt-4">
                <button onclick="likePost()" class="flex items-center gap-2 text-sm bg-gray-800 px-4 py-2 rounded-full hover:bg-gray-700 transition">
                    👍 <span id="like-count">0</span>
                </button>
            </div>
        </div>

        <div class="bg-[#111] border-x border-b border-gray-800 p-4 rounded-b-xl mb-10">
            <h3 class="text-xs font-bold mb-4 text-gray-600 uppercase tracking-widest">Comments</h3>
            
            <div id="comment-list" class="space-y-4 mb-6">
                <p class="text-xs text-gray-500 text-center py-4">댓글을 불러오는 중...</p>
            </div>

            <div class="border-t border-gray-800 pt-4">
                <div class="flex gap-2 mb-2">
                    <input type="text" id="nickname-input" placeholder="닉네임" class="w-24 bg-black border border-gray-700 p-2 rounded text-xs outline-none focus:border-[#ff4655]">
                    <input type="text" id="comment-input" placeholder="따뜻한 댓글을 남겨주세요..." class="flex-1 bg-black border border-gray-700 p-2 rounded text-xs outline-none focus:border-[#ff4655]">
                </div>
                <button onclick="writeComment()" class="w-full bg-[#ff4655] py-2 rounded font-bold text-white text-xs hover:bg-[#ff4655]/80 transition">댓글 등록</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbpiehjkabgpwzeoekdj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_h4h3ZFAbQoYnQIKS8GYQqQ_h1giNJLK';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. 조회수 및 추천수 불러오기
        async function loadViews() {
            try {
                let { data } = await _supabase.from('posts').select('views, likes').eq('id', 1).single();
                if (data) {
                    document.getElementById('view-count').innerText = (data.views || 0).toLocaleString();
                    document.getElementById('like-count').innerText = (data.likes || 0).toLocaleString();
                }
            } catch (e) { console.error(e); }
        }

        // 2. 댓글 목록 불러오기
        async function loadComments() {
            try {
                let { data } = await _supabase.from('comments').select('*').eq('post_id', 1).order('created_at', { ascending: true });
                const list = document.getElementById('comment-list');
                list.innerHTML = ''; 

                if (data && data.length > 0) {
                    data.forEach(comment => {
                        // DB에 저장된 실제 관리자 여부 확인 (현재는 닉네임 기반으로 예시)
                        const isAdmin = comment.nickname === 'ckdgud1117-maker' || comment.is_admin === true;
                        const div = document.createElement('div');
                        div.className = `p-4 rounded border ${isAdmin ? 'border-yellow-500 bg-yellow-500/5' : 'border-gray-800 bg-[#1a1a1a]'}`;
                        div.innerHTML = `
                            <div class="flex justify-between mb-2">
                                <span class="text-xs font-bold ${isAdmin ? 'text-yellow-500' : 'text-blue-400'}">
                                    ${isAdmin ? '👑 ' : ''}${comment.nickname}
                                </span>
                                <span class="text-[10px] text-gray-600">${new Date(comment.created_at).toLocaleTimeString()}</span>
                            </div>
                            <p class="text-sm ${isAdmin ? 'text-white font-medium' : 'text-gray-300'}">${comment.content}</p>
                        `;
                        list.appendChild(div);
                    });
                } else {
                    list.innerHTML = '<p class="text-xs text-gray-500 text-center py-4">첫 댓글을 남겨보세요!</p>';
                }
            } catch (e) { console.error(e); }
        }

        // 3. 댓글 쓰기 (보안 로직 추가)
        async function writeComment() {
            const nickInput = document.getElementById('nickname-input');
            const contentInput = document.getElementById('comment-input');
            let nickname = nickInput.value.trim() || "익명";
            const content = contentInput.value.trim();

            if (!content) return alert("내용을 입력하세요!");

            // [보안] 비회원이 관리자 닉네임을 사용하려 할 때 차단
            const reservedNicks = ['운영자', 'ckdgud1117', 'admin', '관리자'];
            if (reservedNicks.includes(nickname)) {
                alert("해당 닉네임은 운영자 전용입니다. 다른 닉네임을 사용해주세요!");
                return;
            }

            const { error } = await _supabase.from('comments').insert([{ post_id: 1, nickname, content }]);
            if (!error) {
                contentInput.value = '';
                loadComments();
            }
        }

        // 4. 조회수 조작
        async function updateViews() {
            const current = document.getElementById('view-count').innerText.replace(/,/g, '');
            const newVal = prompt("조작할 숫자:", current);
            if (newVal !== null) {
                await _supabase.from('posts').update({ views: parseInt(newVal) }).eq('id', 1);
                loadViews();
            }
        }

        // 5. 추천하기
        async function likePost() {
            let { data } = await _supabase.from('posts').select('likes').eq('id', 1).single();
            await _supabase.from('posts').update({ likes: (data.likes || 0) + 1 }).eq('id', 1);
            loadViews();
        }

        loadViews();
        loadComments();
    </script>
</body>
</html>
