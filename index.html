<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV COMMUNITY - 멤버 전용</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0b0b; color: #e5e7eb; font-family: 'sans-serif'; }
        .admin-nickname {
            font-weight: bold;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gold-shine 3s infinite linear;
            background-size: 200% auto;
        }
        @keyframes gold-shine { to { background-position: 200% center; } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#111] sticky top-0 z-50">
        <h1 class="text-xl font-bold text-[#ff4655] tracking-tighter">SV COMMUNITY</h1>
        <div id="auth-status" class="text-xs text-gray-400">
            </div>
    </nav>

    <div class="max-w-3xl mx-auto p-4">
        <div class="mt-6 p-6 bg-[#1a1a1a] rounded-t-xl border border-gray-800">
            <h2 class="text-xl font-bold text-white mb-2 text-sm">멤버 전용 커뮤니티 테스트</h2>
            <p class="text-gray-500 text-[10px] mb-4 border-b border-gray-800 pb-4">
                이곳은 회원가입 후 로그인한 유저만 소통할 수 있는 공간입니다.
            </p>
            
            <div class="flex gap-4">
                <button onclick="likePost()" class="flex items-center gap-2 text-xs bg-gray-800 px-4 py-2 rounded-full">
                    👍 <span id="like-count">0</span>
                </button>
            </div>
        </div>

        <div class="bg-[#111] border-x border-b border-gray-800 p-4 rounded-b-xl mb-10">
            <h3 class="text-[10px] font-bold mb-4 text-gray-600 uppercase tracking-widest">Comments</h3>
            
            <div id="comment-list" class="space-y-4 mb-6 text-sm">
                </div>

            <div id="comment-form-container" class="border-t border-gray-800 pt-4">
                </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbpiehjkabgpwzeoekdj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_h4h3ZFAbQoYnQIKS8GYQqQ_h1giNJLK';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // 1. 초기화 및 유저 상태 확인
        async function init() {
            const { data: { user } } = await _supabase.auth.getUser();
            currentUser = user;
            updateUI();
            loadViews();
            loadComments();
        }

        // 2. 로그인 상태에 따라 화면 변경
        function updateUI() {
            const authStatus = document.getElementById('auth-status');
            const formContainer = document.getElementById('comment-form-container');

            if (currentUser) {
                // 로그인 된 경우
                authStatus.innerHTML = `<span class="admin-nickname">${currentUser.email.split('@')[0]}</span>님 환영합니다!`;
                formContainer.innerHTML = `
                    <div class="flex gap-2">
                        <input type="text" id="comment-input" placeholder="커뮤니티 규칙을 준수해주세요." class="flex-1 bg-black border border-gray-700 p-3 rounded text-xs outline-none focus:border-[#ff4655]">
                        <button onclick="writeComment()" class="bg-[#ff4655] px-6 py-2 rounded font-bold text-white text-xs">등록</button>
                    </div>`;
            } else {
                // 로그인 안 된 경우
                authStatus.innerHTML = `<button onclick="alert('준비 중인 기능입니다. (Auth 세팅 필요)')" class="hover:text-white">로그인/회원가입</button>`;
                formContainer.innerHTML = `
                    <div class="bg-black/50 p-6 rounded border border-dashed border-gray-800 text-center">
                        <p class="text-xs text-gray-500 mb-2">로그인한 회원만 댓글을 남길 수 있습니다.</p>
                        <button class="text-[#ff4655] text-xs font-bold underline">지금 로그인하기</button>
                    </div>`;
            }
        }

        // 3. 댓글 쓰기 (로그인 정보 자동 포함)
        async function writeComment() {
            if (!currentUser) return alert("로그인이 필요합니다.");

            const input = document.getElementById('comment-input');
            const content = input.value.trim();
            if (!content) return;

            const { error } = await _supabase.from('comments').insert([{
                post_id: 1,
                nickname: currentUser.email.split('@')[0], // 이메일 앞자리 자동 닉네임
                content: content,
                is_admin: currentUser.email === 'ckdgud1117@gmail.com' // 본인 이메일로 수정하세요
            }]);

            if (!error) {
                input.value = '';
                loadComments();
            }
        }

        // 4. 기존 로드 함수들
        async function loadViews() {
            let { data } = await _supabase.from('posts').select('views, likes').eq('id', 1).single();
            if (data) {
                document.getElementById('like-count').innerText = data.likes || 0;
            }
        }

        async function loadComments() {
            let { data } = await _supabase.from('comments').select('*').eq('post_id', 1).order('created_at', { ascending: true });
            const list = document.getElementById('comment-list');
            list.innerHTML = data && data.length > 0 ? '' : '<p class="text-center py-4 text-gray-600 text-xs">아직 댓글이 없습니다.</p>';
            
            data?.forEach(c => {
                const div = document.createElement('div');
                div.className = `p-3 rounded border ${c.is_admin ? 'border-yellow-500/50 bg-yellow-500/5' : 'border-gray-800 bg-[#151515]'}`;
                div.innerHTML = `<div class="flex justify-between mb-1">
                    <span class="text-[10px] font-bold ${c.is_admin ? 'text-yellow-500' : 'text-blue-400'}">${c.is_admin ? '👑 ' : ''}${c.nickname}</span>
                    <span class="text-[8px] text-gray-600">${new Date(c.created_at).toLocaleTimeString()}</span>
                </div>
                <p class="text-xs text-gray-300">${c.content}</p>`;
                list.appendChild(div);
            });
        }

        async function likePost() {
            let { data } = await _supabase.from('posts').select('likes').eq('id', 1).single();
            await _supabase.from('posts').update({ likes: (data.likes || 0) + 1 }).eq('id', 1);
            loadViews();
        }

        init();
    </script>
</body>
</html>
